<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lozenetz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; }
    .serif { font-family: 'Playfair Display', serif; }
    .lozenec-word { font-family: 'Playfair Display', serif; letter-spacing: .045em; }
    .logo-gold { color: #b7a15a; }
  </style>
</head>
<body class="bg-[#fbfaf7] text-stone-950">
  <main class="min-h-screen px-6">
    <div class="mx-auto max-w-4xl">

      <!-- NAV -->
      <nav class="flex items-center justify-between py-7">
        <div class="flex items-center gap-3">
          <div class="lozenec-word text-xl text-[#173d34]">LOZENETZ</div>
        </div>
        <div class="flex rounded-full bg-stone-100 p-1 text-xs font-medium tracking-wide">
          <button onclick="setLang('bg')" class="rounded-full bg-white px-3.5 py-1.5 text-stone-950 shadow-sm">BG</button>
          <button onclick="setLang('en')" class="rounded-full px-3.5 py-1.5 text-stone-500">EN</button>
        </div>
      </nav>

      <!-- HERO -->
      <section class="pb-16 pt-10 text-center md:pb-20 md:pt-16">
        <div id="badge" class="mb-7 inline-block rounded-full border border-stone-200 px-4 py-1.5 text-xs tracking-wide text-stone-500">Очаквайте скоро</div>
        <h1 id="title" class="serif mx-auto mb-5 max-w-3xl text-5xl font-light leading-[1.08] tracking-[-0.035em] md:text-7xl">
          Всички нови имоти в Лозенец. Едно място.
        </h1>
        <p id="subtitle" class="mx-auto mb-9 max-w-xl text-base font-light leading-7 text-stone-600">
          Получавайте новите обяви първи
        </p>

        <!-- FORM (DIRECT TO SHEET) -->
        <form id="leadForm" class="mx-auto flex max-w-md flex-col gap-3">
          <input id="email" type="email" required
            class="w-full rounded-lg border px-4 py-3"
            placeholder="Вашият имейл" />

          <label class="text-xs text-stone-500 flex gap-2 items-start">
            <input id="consent" type="checkbox" required class="mt-1" />
            <span id="consentText">Съгласявам се да получавам известия за старта и нови имоти</span>
          </label>

          <button type="submit" class="w-full bg-emerald-900 text-white py-3 rounded-lg">
            <span id="cta">Запиши ме за ранен достъп →</span>
          </button>
        </form>

        <div id="successMessage" class="hidden mt-4 text-emerald-700">
          Благодарим! Ще ви уведомим при старт.
        </div>
      </section>

    </div>
  </main>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVA0PmvlJ7rTHSTa-pnFOmN4yX0-0vFf4mF-J9gxTyRfjFnMGaZq2zd0svIQjDqn3S/exec";

const translations = {
  bg: {
    badge: "Очаквайте скоро",
    title: "Всички нови имоти в Лозенец. Едно място.",
    subtitle: "Получавайте новите обяви първи",
    cta: "Запиши ме за ранен достъп →",
    consent: "Съгласявам се да получавам известия за старта и нови имоти",
    success: "Благодарим! Ще ви уведомим при старт."
  },
  en: {
    badge: "Coming soon",
    title: "All new properties in Lozenets. One place.",
    subtitle: "Be the first to see new listings",
    cta: "Get early access →",
    consent: "I agree to receive updates about launch and new listings",
    success: "Thank you! We'll notify you."
  }
};

function setLang(lang){
  const t = translations[lang];
  document.getElementById('badge').innerText = t.badge;
  document.getElementById('title').innerText = t.title;
  document.getElementById('subtitle').innerText = t.subtitle;
  document.getElementById('cta').innerText = t.cta;
  document.getElementById('consentText').innerText = t.consent;
  document.getElementById('successMessage').innerText = t.success;
}

document.getElementById('leadForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const consent = document.getElementById('consent').checked ? "yes" : "no";
  const lang = document.getElementById('cta').innerText.includes('Get') ? 'en' : 'bg';

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: new URLSearchParams({
      email: email,
      consent: consent,
      language: lang,
      source: 'lozenetz.bg'
    })
  })
  .then(() => {
    document.getElementById('leadForm').reset();
    document.getElementById('successMessage').classList.remove('hidden');
  })
  .catch(() => alert('Error'));
});
</script>

</body>
</html>
